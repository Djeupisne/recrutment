<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion – Espace Recruteur</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="logo-area">
      <div style="font-size:2.5rem;margin-bottom:.5rem">🏦</div>
      <h2>RecrutBank</h2>
      <p>Espace Recruteur — Accès Sécurisé</p>
    </div>

    <div id="login-alert"></div>

    <form id="login-form">
      <div class="form-group">
        <label>Adresse email</label>
        <input class="form-control" type="email" id="email" placeholder="recruteur@banque.com" required>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <div style="position:relative">
          <input class="form-control" type="password" id="password" placeholder="••••••••" required style="padding-right:2.8rem" autocomplete="current-password">
          <button type="button" onclick="togglePwd()" style="position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem" id="eye-btn">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn" style="margin-top:.5rem">
        🔐 Se connecter
      </button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:.83rem;color:var(--text-muted)">
      <a href="index.html">← Retour à l'accueil</a>
    </p>

    <div style="margin-top:1.8rem;padding:1rem;background:#f4f6fa;border-radius:8px;font-size:.8rem;color:var(--text-muted)">
      <strong>Démo :</strong><br>
      📧 recruteur@banque.com<br>
      🔑 admin123
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
const API = window.location.hostname === "localhost"
  ? "http://localhost:5000/api"
  : "https://gestion-candidatures-niom.onrender.com/api";

function togglePwd() {
  const p = document.getElementById('password');
  p.type = p.type === 'password' ? 'text' : 'password';
  document.getElementById('eye-btn').textContent = p.type === 'password' ? '👁️' : '🙈';
}

document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.innerHTML = '<span class="spinner"></span> Connexion...';
  btn.disabled = true;

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if(res.ok) {
      localStorage.setItem('rh_token', data.token);
      localStorage.setItem('rh_nom', data.nom);
      localStorage.setItem('rh_email', data.email);
      window.location.href = 'dashboard-recruteur.html';
    } else {
      document.getElementById('login-alert').innerHTML = `<div class="alert alert-error">⚠️ ${data.error}</div>`;
    }
  } catch {
    document.getElementById('login-alert').innerHTML = `<div class="alert alert-error">⚠️ Erreur de connexion au serveur.</div>`;
  }
  btn.innerHTML = '🔐 Se connecter';
  btn.disabled = false;
});

// Si déjà connecté
if(localStorage.getItem('rh_token')) window.location.href = 'dashboard-recruteur.html';
</script>
</body>
</html>
