<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion – Espace Recruteur</title>
  <link rel="stylesheet" href="style.css">
  <style>
  /* ── PROTECTION ANTI-INSPECTION ──────────── */
#security-warning {
  display: none; /* ✅ Caché par défaut — NE DOIT PAS s'afficher au chargement */
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.92);
  z-index: 99999;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  color: #fff;
  padding: 2rem;
  backdrop-filter: blur(8px);
  animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.98); }
  to { opacity: 1; transform: scale(1); }
}

#security-warning .icon {
  font-size: 4.5rem;
  margin-bottom: 1.2rem;
  animation: pulse 1.8s infinite;
  text-shadow: 0 0 20px rgba(255, 107, 107, 0.6);
}

#security-warning h2 {
  font-size: 1.9rem;
  margin-bottom: 1rem;
  color: #ff6b6b;
  font-weight: 700;
}

#security-warning p {
  font-size: 1.15rem;
  max-width: 550px;
  line-height: 1.7;
  margin: 0 auto 1.5rem;
  color: #e2e8f0;
}

#security-warning a {
  color: #7c9bff;
  text-decoration: none;
  font-weight: 600;
}

#security-warning a:hover {
  text-decoration: underline;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}
  </style>
</head>
<body>

<!-- ══ MODAL DE SÉCURITÉ - ANTI-INSPECTION ══ -->
<div id="security-warning">
  <div class="icon">🔒</div>
  <h2>⚠️ Accès Restreint</h2>
  <p>action non autorisé veillez contacter DJEUPISNE Oualoumi via son port folio <a href="https://djeupisne.vercel.app" target="_blank">djeupisne.vercel.app</a></p>
</div>

<div class="login-page">
  <div class="login-box">
    <div class="logo-area">
      <div style="font-size:2.5rem;margin-bottom:.5rem">🏦</div>
      <h2>RecrutBank</h2>
      <p>Espace Recruteur — Accès Sécurisé</p>
    </div>

    <div id="login-alert"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Adresse email</label>
        <input class="form-control" type="email" id="email" placeholder="recruteur@banque.com" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div style="position:relative">
          <input class="form-control" type="password" id="password" placeholder="••••••••" required style="padding-right:2.8rem" autocomplete="current-password">
          <button type="button" onclick="togglePwd()" style="position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem" id="eye-btn">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn" style="margin-top:.5rem">
        🔐 Se connecter
      </button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:.83rem;color:var(--text-muted)">
      <a href="index.html">← Retour à l'accueil</a>
    </p>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   🔒 PROTECTION ANTI-INSPECTION — VERSION SÉCURISÉE
   ✅ Aucune alerte au chargement
   ✅ Déclenchement UNIQUEMENT sur action d'inspection
   ══════════════════════════════════════════════════════════ */

(function() {
  const WARNING = document.getElementById('security-warning');
  let warningShown = false; // Évite les déclenchements multiples
  
  // Fonction pour afficher le modal
  function showWarning() {
    if (warningShown) return; // Déjà affiché → ne pas répéter
    if (WARNING) {
      WARNING.style.display = 'flex';
      document.body.style.overflow = 'hidden';
      warningShown = true;
    }
  }
  
  // 🔴 Blocage des raccourcis clavier d'inspection
  document.addEventListener('keydown', function(e) {
    // F12
    if (e.key === 'F12') {
      e.preventDefault();
      showWarning();
      return false;
    }
    // Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C (DevTools)
    if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) {
      e.preventDefault();
      showWarning();
      return false;
    }
    // Ctrl+U (Voir source)
    if (e.ctrlKey && e.key.toUpperCase() === 'U') {
      e.preventDefault();
      showWarning();
      return false;
    }
    // Ctrl+Shift+S (Enregistrer page)
    if (e.ctrlKey && e.shiftKey && e.key.toUpperCase() === 'S') {
      e.preventDefault();
      showWarning();
      return false;
    }
    // Ctrl+Alt+I (variante DevTools)
    if (e.ctrlKey && e.altKey && e.key.toUpperCase() === 'I') {
      e.preventDefault();
      showWarning();
      return false;
    }
  }, { passive: false });
  
  // 🔴 Blocage du clic droit (sauf dans les champs de formulaire)
  document.addEventListener('contextmenu', function(e) {
    // Autoriser le clic droit dans les champs pour coller du texte
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
      return;
    }
    // Pour le reste : afficher le modal
    e.preventDefault();
    showWarning();
    return false;
  }, { passive: false });
  
  // ❌ SUPPRIMÉ : console.log(devtools) → cause du blocage au chargement
  // Cette méthode est trop agressive et déclenche l'alerte même sans action utilisateur
  
  // ✅ Aucune action au chargement de la page
  // Le modal reste caché tant qu'aucune inspection n'est tentée
  
})();
/* ══════════════════════════════════════════════════════════
   CONFIG & FONCTIONS DE CONNEXION
   ══════════════════════════════════════════════════════════ */

// CONFIGURATION DE L'URL BACKEND
const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
  ? "http://localhost:5000/api"
  : "https://backend1-fiq5.onrender.com/api";

function togglePwd() {
  const p = document.getElementById('password');
  p.type = p.type === 'password' ? 'text' : 'password';
  document.getElementById('eye-btn').textContent = p.type === 'password' ? '👁️' : '🙈';
}

document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const alertDiv = document.getElementById('login-alert');
  
  btn.innerHTML = 'Connexion...';
  btn.disabled = true;
  alertDiv.innerHTML = '';

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({ email, password })
    });
    
    const data = await res.json();
    
    if(res.ok) {
      // Stockage des infos de session
      localStorage.setItem('rh_token', data.token);
      localStorage.setItem('rh_nom', data.nom || 'Recruteur');
      localStorage.setItem('rh_email', email);
      
      // Redirection vers le dashboard
      window.location.href = 'dashboard-recruteur.html';
    } else {
      alertDiv.innerHTML = `<div class="alert alert-error" style="color:red; margin-bottom:10px;">⚠️ ${data.error || 'Identifiants incorrects'}</div>`;
    }
  } catch (error) {
    console.error("Erreur login:", error);
    alertDiv.innerHTML = `<div class="alert alert-error" style="color:red; margin-bottom:10px;">⚠️ Impossible de joindre le serveur. Vérifiez votre connexion.</div>`;
  } finally {
    btn.innerHTML = '🔐 Se connecter';
    btn.disabled = false;
  }
});

// Vérification si déjà connecté au chargement
window.addEventListener('load', () => {
  if(localStorage.getItem('rh_token')) {
    window.location.href = 'dashboard-recruteur.html';
  }
});
</script>
</body>
</html>
