<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banque – Recrutement</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="brand">🏦 <span>RecrutBank</span></div>
  <div class="nav-links">
    <a href="#postes">Postes</a>
    <a href="#postuler">Postuler</a>
    <a href="#suivi">Suivi</a>
    <a href="login.html" class="btn-nav">🔐 Recruteur</a>
  </div>
</nav>

<section class="section" id="postes">
  <div class="container">
    <h2 style="text-align:center">Postes Ouverts</h2>
    <div class="postes-grid" id="postes-list">
      </div>
  </div>
</section>

<section class="section" id="postuler">
  <div class="container">
    <div class="card" style="max-width:600px;margin:0 auto">
      <h3>Déposer une candidature</h3>
      <div id="form-alert"></div>
      <form id="candidature-form">
        <input class="form-control" name="prenom" placeholder="Prénom" required>
        <input class="form-control" name="nom" placeholder="Nom" required>
        <input class="form-control" type="email" name="email" placeholder="Email" required>
        <select class="form-control" name="poste" id="poste-select" required>
          <option value="">— Choisir un poste —</option>
        </select>
        <button type="submit" class="btn btn-primary" id="submit-btn">Envoyer</button>
      </form>
      <div id="candidature-success" style="display:none; text-align:center; margin-top:20px;">
        <h4 style="color:green">Succès ! Voici votre code de suivi :</h4>
        <div id="token-display" style="font-weight:bold; font-size:1.2rem; background:#eee; padding:10px;"></div>
      </div>
    </div>
  </div>
</section>

<section class="section" id="suivi">
  <div class="container">
    <div class="card" style="max-width:500px;margin:0 auto">
      <h3>Suivi de dossier</h3>
      <input class="form-control" id="suivi-token" placeholder="Numéro de suivi...">
      <button class="btn btn-primary" onclick="checkSuivi()">Rechercher</button>
      <div id="suivi-result" style="margin-top:20px"></div>
    </div>
  </div>
</section>

<script>
// CONFIGURATION DE L'URL BACKEND
const API = 'https://backend1-fiq5.onrender.com/api';

// Charger les postes depuis le backend
fetch(`${API}/postes`)
  .then(res => res.json())
  .then(postes => {
    const grid = document.getElementById('postes-list');
    const select = document.getElementById('poste-select');
    postes.forEach(p => {
      grid.innerHTML += `<div class="poste-card"><h3>${p}</h3><a href="#postuler">Postuler</a></div>`;
      select.innerHTML += `<option value="${p}">${p}</option>`;
    });
  })
  .catch(err => console.error("Erreur backend:", err));

// Envoyer la candidature
document.getElementById('candidature-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const fd = new FormData(this);
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/candidats/postuler`, { method: 'POST', body: fd });
    const data = await res.json();
    if (res.ok) {
      this.style.display = 'none';
      document.getElementById('candidature-success').style.display = 'block';
      document.getElementById('token-display').textContent = data.token;
    } else {
      alert("Erreur: " + data.error);
    }
  } catch (err) {
    alert("Impossible de contacter le serveur.");
  }
  btn.disabled = false;
});

// Suivre un dossier
async function checkSuivi() {
  const token = document.getElementById('suivi-token').value;
  const resDiv = document.getElementById('suivi-result');
  try {
    const r = await fetch(`${API}/candidats/statut/${token}`);
    const d = await r.json();
    if (r.ok) {
      resDiv.innerHTML = `<div class="card"><strong>Statut :</strong> ${d.statut}</div>`;
    } else {
      resDiv.innerHTML = "Code introuvable.";
    }
  } catch (err) {
    resDiv.innerHTML = "Erreur de connexion.";
  }
}
</script>
</body>
</html>
