<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de Bord – RecrutBank</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<nav class="navbar">
  <div class="brand">🏦 <span>RecrutBank</span> <span class="tag">Recruteur</span></div>
  <div class="nav-links">
    <span id="nav-nom" style="color:rgba(255,255,255,.7);font-size:.88rem"></span>
    <button class="btn btn-outline btn-sm" onclick="logout()">🚪 Déconnexion</button>
  </div>
</nav>

<div class="dash-layout">
  <aside class="sidebar">
    <div class="sidebar-user">
      <div class="avatar" id="sidebar-avatar">R</div>
      <div class="u-name" id="sidebar-nom">Recruteur</div>
      <div class="u-role">Responsable RH</div>
    </div>
    <nav>
      <a href="#" class="active" onclick="showSection('overview',this)"><span class="icon">📊</span> Vue d'ensemble</a>
      <a href="#" onclick="showSection('candidats',this)"><span class="icon">👥</span> Candidats</a>
    </nav>
  </aside>

  <main class="dash-main">
    <div id="section-overview">
      <h2 class="dash-title">Vue d'ensemble</h2>
      <div class="stats-grid">
        <div class="stat-card blue"><div class="stat-value" id="s-total">0</div><div class="stat-label">Candidatures</div></div>
        <div class="stat-card amber"><div class="stat-value" id="s-attente">0</div><div class="stat-label">En attente</div></div>
        <div class="stat-card green"><div class="stat-value" id="s-retenu">0</div><div class="stat-label">Retenus</div></div>
      </div>
      <div class="chart-grid" style="margin-top:2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="chart-box" style="background: white; padding: 15px; border-radius: 8px;">
          <h4>Répartition des statuts</h4>
          <canvas id="chart-statut"></canvas>
        </div>
      </div>
    </div>

    <div id="section-candidats" style="display:none">
      <h2 class="dash-title">Gestion des Candidats</h2>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Candidat</th><th>Poste</th><th>Date</th><th>Statut</th><th>Score</th><th>Actions</th></tr></thead>
            <tbody id="candidats-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-candidat">
  <div class="modal">
    <div class="modal-header"><h3 id="modal-title">Dossier</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-success" onclick="updateStatut('retenu')">✅ Retenir</button>
      <button class="btn btn-warning" onclick="updateStatut('entretien')">📅 Entretien</button>
      <button class="btn btn-danger" onclick="updateStatut('rejete')">❌ Rejeter</button>
    </div>
  </div>
</div>

<script>
const API = 'https://backend1-fiq5.onrender.com/api';
let token = localStorage.getItem('rh_token');
let currentCandidatId = null;
let myChart = null;

if(!token) window.location.href = 'login.html';
document.getElementById('nav-nom').textContent = localStorage.getItem('rh_nom') || '';

function logout() { localStorage.clear(); window.location.href = 'login.html'; }
function authHeaders() { return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }; }

function showSection(name, el) {
  document.getElementById('section-overview').style.display = name === 'overview' ? 'block' : 'none';
  document.getElementById('section-candidats').style.display = name === 'candidats' ? 'block' : 'none';
  if(el) {
    document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
    el.classList.add('active');
  }
  if(name === 'candidats') loadCandidats();
  if(name === 'overview') loadStats();
}

async function loadStats() {
  try {
    const res = await fetch(`${API}/recruteur/stats`, { headers: authHeaders() });
    if(res.status === 401) logout();
    const data = await res.json();

    document.getElementById('s-total').textContent = data.total;
    document.getElementById('s-attente').textContent = data.en_attente;
    document.getElementById('s-retenu').textContent = data.retenu;

    const ctx = document.getElementById('chart-statut').getContext('2d');
    if(myChart) myChart.destroy();
    myChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Attente', 'Retenu', 'Rejeté', 'Entretien'],
        datasets: [{
          data: [data.en_attente, data.retenu, data.rejete, data.entretien],
          backgroundColor: ['#e8a020', '#1e7e34', '#c0392b', '#2980b9']
        }]
      }
    });
  } catch(e) { console.error("Erreur stats:", e); }
}

async function loadCandidats() {
  try {
    const res = await fetch(`${API}/recruteur/candidats`, { headers: authHeaders() });
    const data = await res.json();
    const tbody = document.getElementById('candidats-tbody');
    
    tbody.innerHTML = data.map(c => `
      <tr>
        <td><b>${c.prenom} ${c.nom}</b><br><small>${c.email}</small></td>
        <td>${c.poste}</td>
        <td>${new Date(c.date_candidature).toLocaleDateString()}</td>
        <td><span class="badge">${c.statut}</span></td>
        <td>${'⭐'.repeat(parseInt(c.score) || 0)}</td>
        <td><button class="btn btn-blue btn-sm" onclick="openCandidatModal('${c.id}')">Gérer</button></td>
      </tr>
    `).join('');
  } catch(e) { console.error("Erreur candidats:", e); }
}

async function openCandidatModal(id) {
  currentCandidatId = id;
  const res = await fetch(`${API}/candidats/statut/${id}`, { headers: authHeaders() });
  const c = await res.json();
  
  document.getElementById('modal-title').textContent = `${c.prenom} ${c.nom}`;
  document.getElementById('modal-body').innerHTML = `
    <div style="line-height:1.6">
      <p><strong>Poste :</strong> ${c.poste}</p>
      <p><strong>Email :</strong> ${c.email}</p>
      <p><strong>Score (0-5) :</strong> <input type="number" id="m-score" value="${c.score || 0}" min="0" max="5" class="form-control" style="width:60px"></p>
      <p><strong>Notes internes :</strong><br>
      <textarea id="m-note" class="form-control" style="width:100%; height:80px">${c.note || ''}</textarea></p>
    </div>
  `;
  document.getElementById('modal-candidat').classList.add('open');
}

function closeModal() { document.getElementById('modal-candidat').classList.remove('open'); }

async function updateStatut(statut) {
  const note = document.getElementById('m-note').value;
  const score = document.getElementById('m-score').value;
  
  const res = await fetch(`${API}/recruteur/candidats/${currentCandidatId}/statut`, {
    method: 'PUT',
    headers: authHeaders(),
    body: JSON.stringify({ statut, note, score })
  });
  
  if(res.ok) {
    closeModal();
    loadCandidats();
    loadStats();
  } else {
    alert("Erreur lors de la mise à jour");
  }
}

// Lancement
loadStats();
</script>
</body>
</html>
